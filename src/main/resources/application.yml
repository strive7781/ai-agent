spring:
  application:
    name: yu-ai-agent-backend
  profiles:
    active: local

#  ai:
#    vectorstore:
#      pgvector:
#        index-type: HNSW
#        dimensions: 1024
#        distance-type: COSINE_DISTANCE
#        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yupi.aiagentbackend.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
